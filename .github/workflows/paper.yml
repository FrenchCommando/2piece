name: Build paper

on:
  push:
    branches: [master]
    paths:
      - 'paper/**'
      - 'figures/**'
      - '.github/workflows/paper.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Cache the downloaded .deb archives (the slow part of the apt install
      # is fetching texlive-latex-extra). Keyed on this workflow file so the
      # cache busts automatically if the package list changes; restore-keys
      # lets a stale cache still seed unchanged debs (apt only re-downloads
      # the diff). The cache dir is runner-owned so actions/cache can save it.
      - name: Cache apt archives
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.apt-cache
          key: apt-texlive-${{ runner.os }}-${{ hashFiles('.github/workflows/paper.yml') }}
          restore-keys: |
            apt-texlive-${{ runner.os }}-

      - name: Install LaTeX and SVG tooling
        run: |
          set -e
          APT_CACHE="${{ github.workspace }}/.apt-cache"
          mkdir -p "$APT_CACHE/archives/partial"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            -o Dir::Cache::archives="$APT_CACHE/archives" \
            -o APT::Keep-Downloaded-Packages=true \
            texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-bibtex-extra biber \
            librsvg2-bin fonts-dejavu-core

      # pdflatex cannot embed SVG directly; rasterise-free SVG -> PDF.
      - name: Convert figures SVG -> PDF
        run: |
          for f in figures/*.svg; do
            rsvg-convert -f pdf -o "figures/$(basename "${f%.svg}").pdf" "$f"
          done

      - name: Compile paper
        working-directory: paper
        run: |
          pdflatex -interaction=nonstopmode -halt-on-error 2piece-paper.tex
          bibtex 2piece-paper || true
          pdflatex -interaction=nonstopmode -halt-on-error 2piece-paper.tex
          pdflatex -interaction=nonstopmode -halt-on-error 2piece-paper.tex

      - uses: actions/upload-artifact@v4
        with:
          name: 2piece-paper
          path: paper/2piece-paper.pdf
          if-no-files-found: error
