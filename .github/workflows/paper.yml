name: Build paper

on:
  push:
    branches: [master]
    paths:
      - 'paper/**'
      - 'figures/**'
      - '.github/workflows/paper.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Cache the downloaded .deb archives (the slow part of the apt install
      # is fetching texlive-latex-extra). Keyed on this workflow file so the
      # cache busts automatically if the package list changes; restore-keys
      # lets a stale cache still seed unchanged debs (apt only re-downloads
      # the diff). The cache dir is runner-owned so actions/cache can save it.
      - name: Cache apt archives
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.apt-cache
          key: apt-texlive-${{ runner.os }}-${{ hashFiles('.github/workflows/paper.yml') }}
          restore-keys: |
            apt-texlive-${{ runner.os }}-

      - name: Install LaTeX
        run: |
          set -e
          APT_CACHE="${{ github.workspace }}/.apt-cache"
          mkdir -p "$APT_CACHE/archives/partial"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            -o Dir::Cache::archives="$APT_CACHE/archives" \
            -o APT::Keep-Downloaded-Packages=true \
            texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-bibtex-extra biber \
            fonts-dejavu-core
          # apt writes some files (e.g. archives/lock, mode 640 root) the
          # runner can't read; chown so actions/cache can tar the dir.
          sudo chown -R "$(id -u):$(id -g)" "$APT_CACHE"

      - name: Compile paper
        working-directory: paper
        run: |
          pdflatex -interaction=nonstopmode -halt-on-error 2piece-paper.tex
          bibtex 2piece-paper || true
          pdflatex -interaction=nonstopmode -halt-on-error 2piece-paper.tex
          pdflatex -interaction=nonstopmode -halt-on-error 2piece-paper.tex

      - uses: actions/upload-artifact@v4
        with:
          name: 2piece-paper
          path: paper/2piece-paper.pdf
          if-no-files-found: error

      # Publish as a Release asset so the PDF is downloadable without a
      # GitHub login. Stable URL pattern:
      #   github.com/<repo>/releases/latest/download/2piece-paper.pdf
      # One release per paper-affecting push. Tag is the commit timestamp
      # (UTC, second precision) + short SHA so that lexical sort on the
      # GitHub Releases UI matches chronological order. The "latest"
      # marker moves automatically via make_latest:true.
      - name: Compute release name from commit timestamp
        id: relname
        run: |
          COMMIT_TS=$(git log -1 --format=%ct)
          TIMESTAMP=$(date -u -d "@$COMMIT_TS" +"%Y%m%d-%H%M%S")
          DISPLAY=$(date -u -d "@$COMMIT_TS" +"%Y-%m-%d %H:%M:%S UTC")
          SHORT_SHA=$(git rev-parse --short HEAD)
          {
            echo "tag=paper-${TIMESTAMP}-${SHORT_SHA}"
            echo "name=Paper ${DISPLAY} (${SHORT_SHA})"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.relname.outputs.tag }}
          name: ${{ steps.relname.outputs.name }}
          files: paper/2piece-paper.pdf
          body: |
            Auto-built paper PDF from commit ${{ github.sha }}.
            Stable download URL:
            https://github.com/${{ github.repository }}/releases/latest/download/2piece-paper.pdf
          make_latest: true
